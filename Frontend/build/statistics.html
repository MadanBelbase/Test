<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics · OSMSG</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="static/css/style.css">
    
</head>

<body>
    <nav class="navbar">
    <div class="container nav-container">
        <div class="logo-area">
            <div class="logo-icon">OSM</div>
            <div class="logo-text">OSM<span>SG</span></div>
            <div class="logo-small">v0.3.0</div>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="https://github.com/OSMSG" target="_blank">GitHub</a>
        </div>
    </div>
</nav>

    

<div class="container" style="margin-top: 4rem; margin-bottom: 6rem;">
    <div
        style="background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 400px; border: 1px solid #e3eee8;">

        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 1.5rem;">
            <div>
                <h1 class="form-title" style="font-size: 2.2rem; color: #1a4a36; margin-bottom: 0.5rem;">
                    Statistics for #hotosm
                </h1>
                <p style="color: #4a6b78; font-size: 1.05rem;">
                    Period: <span data-bind="daterange">All Time</span> · <span data-bind="changesets">12450</span> Changesets · <span data-bind="mappers">4520</span>
                    Mappers
                </p>
            </div>
            <a href="/" class="btn-secondary" style="background: #e2f0e9; padding: 0.6rem 1.4rem;">Search Again</a>
        </div>

        <div
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin: 2rem 0;">
            <!-- Bar Chart -->
            <div style="background: #f8fafc; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e3eee8;">
                <h3 style="font-size: 1.1rem; color: #1a4a36; margin-bottom: 1rem;">Contribution Breakdown</h3>
                <div style="height: 250px;"><canvas id="barChart"></canvas></div>
            </div>

            <!-- Line Chart -->
            <div style="background: #f8fafc; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e3eee8;">
                <h3 style="font-size: 1.1rem; color: #1a4a36; margin-bottom: 1rem;">Activity Trend</h3>
                <div style="height: 250px;"><canvas id="lineChart"></canvas></div>
            </div>

            <!-- Pie Chart -->
            <div style="background: #f8fafc; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e3eee8;">
                <h3 style="font-size: 1.1rem; color: #1a4a36; margin-bottom: 1rem;">Mapper Levels</h3>
                <div style="height: 250px;"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

    </div>
</div>



    <div class="container">
    <hr style="border: 1px solid #d2e8df;">
    <div class="footer">
        <div style="font-weight: 500;">© OSMSG · OpenStreetMap Stats Generator 2026</div>
        <div class="footer-links">
            <a href="#">Contributing</a>
            <a href="#">Code of conduct</a>
        </div>
        
    </div>
</div>

    <script src="static/js/main.js"></script>
    

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Pass structured chart data to JS file via hidden element -->
<script id="charts-data" type="application/json">{"breakdown": {"data": [40, 35, 25, 15, 10], "labels": ["Roads", "Buildings", "POIs", "Landuse", "Waterways"]}, "levels": {"data": [60, 30, 10], "labels": ["Beginner", "Intermediate", "Advanced"]}, "trend": {"data": [120, 150, 180, 210, 250, 300], "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun"]}}</script>


</body>

</html>
